name: Build ONNX Runtime – ARM64 + CUDA 12.6 (Jetson Orin)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (arm64, CUDA 12.6)
    # GitHub-hosted ARM64 runner (Ubuntu 24.04)
    runs-on: ubuntu-24.04-arm

    env:
      CUDA_VERSION: "12.6"
      CUDA_HOME: /usr/local/cuda
      CUDNN_HOME: /usr
      ORT_BUILD_CONFIG: RelWithDebInfo
      ORT_REPO: https://github.com/Microsoft/onnxruntime
      ORT_REF: main          # change to a specific tag/commit for a reproducible build

    steps:
      # -----------------------------------------------------------------------
      # 1. Install system build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            ca-certificates \
            python3 \
            python3-pip \
            python3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            ninja-build \
            gnupg2 \
            software-properties-common \
            lsb-release

      # -----------------------------------------------------------------------
      # 2. Install a recent CMake (>= 3.26 recommended for modern ONNX Runtime)
      # -----------------------------------------------------------------------
      - name: Install CMake
        run: |
          wget -qO /tmp/cmake-install.sh \
            https://github.com/Kitware/CMake/releases/download/v3.29.6/cmake-3.29.6-linux-aarch64.sh
          chmod +x /tmp/cmake-install.sh
          sudo /tmp/cmake-install.sh --skip-license --prefix=/usr/local
          cmake --version

      # -----------------------------------------------------------------------
      # 3. Install CUDA 12.6 (SBSA / aarch64 – works on both Jetson and SBSA)
      # -----------------------------------------------------------------------
      - name: Install CUDA 12.6
        run: |
          # NVIDIA keyring
          wget -qO /tmp/cuda-keyring.deb \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get update -y

          # Install CUDA 12.6 toolkit (compiler + runtime headers)
          sudo apt-get install -y \
            cuda-toolkit-12-6 \
            libcudnn9-cuda-12 \
            libcudnn9-dev-cuda-12

          # Make nvcc visible in PATH
          echo "/usr/local/cuda-12.6/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=/usr/local/cuda-12.6" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 4. Verify CUDA installation
      # -----------------------------------------------------------------------
      - name: Verify CUDA
        run: nvcc --version

      # -----------------------------------------------------------------------
      # 5. Checkout ONNX Runtime (with submodules)
      # -----------------------------------------------------------------------
      - name: Checkout ONNX Runtime
        run: |
          git clone --recursive --depth 1 --branch "$ORT_REF" "$ORT_REPO" /opt/onnxruntime

      # -----------------------------------------------------------------------
      # 6. Install Python build requirements
      # -----------------------------------------------------------------------
      - name: Install Python requirements
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install numpy

      # -----------------------------------------------------------------------
      # 7. Build ONNX Runtime (ARM64, CUDA 12.6, shared library)
      # -----------------------------------------------------------------------
      - name: Build ONNX Runtime
        working-directory: /opt/onnxruntime
        run: |
          ./build.sh \
            --config "$ORT_BUILD_CONFIG" \
            --build_shared_lib \
            --parallel \
            --skip_tests \
            --use_cuda \
            --cuda_home "$CUDA_HOME" \
            --cudnn_home "$CUDNN_HOME" \
            --cmake_extra_defines \
              CMAKE_CUDA_ARCHITECTURES=87   # Jetson Orin (Ampere sm_87)

      # -----------------------------------------------------------------------
      # 8. Collect build artefacts
      # -----------------------------------------------------------------------
      - name: Collect artefacts
        run: |
          mkdir -p /tmp/ort-artefacts
          # Shared libraries
          find /opt/onnxruntime/build/Linux/"$ORT_BUILD_CONFIG" \
            -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) \
            -exec cp {} /tmp/ort-artefacts/ \;
          # Headers
          cp -r /opt/onnxruntime/include/onnxruntime /tmp/ort-artefacts/include
          ls -lh /tmp/ort-artefacts/

      # -----------------------------------------------------------------------
      # 9. Upload artefacts
      # -----------------------------------------------------------------------
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-arm64-cuda12.6
          path: /tmp/ort-artefacts/
          retention-days: 30
