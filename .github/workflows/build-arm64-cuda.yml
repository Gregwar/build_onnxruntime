name: Build ONNX Runtime – ARM64 + CUDA 12.6 (Jetson Orin)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (arm64, CUDA 12.6)
    # GitHub-hosted ARM64 runner (Ubuntu 22.04)
    runs-on: ubuntu-22.04-arm

    env:
      CUDA_VERSION: "12.6"
      CUDNN_HOME: /usr
      TENSORRT_HOME: /usr
      ORT_BUILD_CONFIG: RelWithDebInfo
      ORT_REPO: https://github.com/Microsoft/onnxruntime
      ORT_REF: main          # change to a specific tag/commit for a reproducible build

    steps:
      # -----------------------------------------------------------------------
      # 1. Install system build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            ca-certificates \
            python3 \
            python3-pip \
            python3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            ninja-build \
            gnupg2 \
            software-properties-common \
            lsb-release

      # -----------------------------------------------------------------------
      # 2. Install a recent CMake (>= 3.26 recommended for modern ONNX Runtime)
      # -----------------------------------------------------------------------
      - name: Install CMake
        run: |
          wget -qO /tmp/cmake-install.sh \
            https://github.com/Kitware/CMake/releases/download/v3.29.6/cmake-3.29.6-linux-aarch64.sh
          chmod +x /tmp/cmake-install.sh
          sudo /tmp/cmake-install.sh --skip-license --prefix=/usr/local
          cmake --version

      # -----------------------------------------------------------------------
      # 3. Install CUDA 12.6 (SBSA / aarch64 – works on both Jetson and SBSA)
      # -----------------------------------------------------------------------
      - name: Install CUDA 12.6
        run: |
          # NVIDIA keyring
          wget -qO /tmp/cuda-keyring.deb \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get update -y

          # Install CUDA 12.6 toolkit (compiler + runtime headers)
          sudo apt-get install -y \
            cuda-toolkit-12-6 \
            libcudnn9-cuda-12 \
            libcudnn9-dev-cuda-12

          # Make nvcc visible in PATH and export CUDA_HOME for subsequent steps
          CUDA_HOME_REAL=$(dirname "$(dirname "$(which nvcc 2>/dev/null || echo /usr/local/cuda-12.6/bin/nvcc)")")
          echo "$CUDA_HOME_REAL/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=$CUDA_HOME_REAL" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 4. Install TensorRT 10.x (SBSA / aarch64, CUDA 12.6)
      # -----------------------------------------------------------------------
      - name: Install TensorRT
        run: |
          # The NVIDIA apt repo added in the previous step already carries TRT 10.
          # libnvinfer-dev pulls in headers + libs; libnvinfer-plugin-dev adds plugins.
          sudo apt-get install -y \
            libnvinfer-dev \
            libnvinfer-headers-dev \
            libnvinfer-plugin-dev \
            libnvonnxparsers-dev
          # Verify the headers are where CMake will look
          dpkg -L libnvinfer-headers-dev | grep NvInferVersion.h

      # -----------------------------------------------------------------------
      # 5. Verify CUDA installation
      # -----------------------------------------------------------------------
      - name: Verify CUDA
        run: nvcc --version

      # -----------------------------------------------------------------------
      # 6. Checkout ONNX Runtime (with submodules)
      # -----------------------------------------------------------------------
      - name: Checkout ONNX Runtime
        run: |
          git clone --recursive --depth 1 --branch "$ORT_REF" "$ORT_REPO" /opt/onnxruntime

      # -----------------------------------------------------------------------
      # 7. Install Python build requirements
      # -----------------------------------------------------------------------
      - name: Install Python requirements
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install numpy psutil

      # -----------------------------------------------------------------------
      # 8. Build ONNX Runtime (ARM64, CUDA 12.6, TensorRT, shared library)
      # -----------------------------------------------------------------------
      - name: Build ONNX Runtime
        working-directory: /opt/onnxruntime
        run: |
          # --parallel 2: nvcc is very memory-hungry (>4 GB/thread); the runner
          # has ~15 GB RAM so 2 parallel jobs is the safe ceiling with TRT EP.
          ./build.sh \
            --config "$ORT_BUILD_CONFIG" \
            --build_shared_lib \
            --parallel 2 \
            --skip_tests \
            --use_cuda \
            --cuda_home "$CUDA_HOME" \
            --cudnn_home "$CUDNN_HOME" \
            --use_tensorrt \
            --tensorrt_home "$TENSORRT_HOME" \
            --cmake_extra_defines \
              CMAKE_CUDA_ARCHITECTURES=87 \
            2>&1 | tee /tmp/ort-build.log
          # Propagate the real exit code (tee always exits 0 otherwise)
          exit "${PIPESTATUS[0]}"

      # -----------------------------------------------------------------------
      # 8b. Upload build log on failure (for post-mortem inspection)
      # -----------------------------------------------------------------------
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ort-build-log
          path: /tmp/ort-build.log
          retention-days: 7

      # -----------------------------------------------------------------------
      # 9. Install artefacts to a custom prefix via cmake --install
      # -----------------------------------------------------------------------
      - name: Install artefacts
        run: |
          cmake --install /opt/onnxruntime/build/Linux/"$ORT_BUILD_CONFIG" \
            --config "$ORT_BUILD_CONFIG" \
            --prefix /tmp/ort-install
          ls -lhR /tmp/ort-install/

      # -----------------------------------------------------------------------
      # 10. Upload artefacts
      # -----------------------------------------------------------------------
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-arm64-cuda12.6
          path: /tmp/ort-install/
          retention-days: 30
